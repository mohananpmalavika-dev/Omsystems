logLevel: info

api: yes
apiAddress: :9997

authMethod: http
authHTTPAddress: http://media-gateway:8090/internal/mediamtx/auth
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof

hls: yes
hlsAddress: :8888
hlsVariant: lowLatency
hlsAllowOrigins: ["*"]

webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcAllowOrigins: ["*"]

pathDefaults:
  sourceOnDemand: yes
  sourceOnDemandStartTimeout: 10s
  sourceOnDemandCloseAfter: 10s

paths: {}
