services:
  # Public dashboard/BFF. Camera media can remain at the branch edge, while
  # all metadata and authorization calls use the Render-hosted control plane.
  - type: web
    name: sentinel-grid-monitoring
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run dashboard:build
    startCommand: npm run start --workspace @sentinel/dashboard -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DASHBOARD_DEMO_MODE
        value: "false"
      - key: CONTROL_PLANE_INTERNAL_URL
        value: "https://sentinel-grid-control-plane.onrender.com"
      - key: MEDIA_GATEWAY_INTERNAL_URL
        value: "https://sentinel-grid-media-gateway.onrender.com"
      - key: EDGE_BRIDGE_SHARED_KEY
        value: "dev-bridge-key-change-in-production"
      - key: DASHBOARD_ACCESS_USERNAME
        sync: false
      - key: DASHBOARD_ACCESS_PASSWORD
        sync: false

  # Media Gateway for live streaming
  - type: web
    name: sentinel-grid-media-gateway
    runtime: docker
    dockerfilePath: ./media-gateway/Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "8090"
      - key: MEDIAMTX_API_URL
        value: "http://127.0.0.1:9997"
      - key: MEDIAMTX_HLS_URL
        value: "http://127.0.0.1:8888"
      - key: PUBLIC_HLS_BASE_URL
        value: "https://sentinel-grid-media-gateway.onrender.com/hls"
      - key: CONTROL_PLANE_URL
        value: "https://sentinel-grid-control-plane.onrender.com"
      - key: STREAM_SECRETS_JSON
        sync: false
      - key: MEDIA_GATEWAY_SHARED_KEY
        value: "dev-media-gateway-key-change-in-production"
      - key: EDGE_BRIDGE_SHARED_KEY
        value: "dev-bridge-key-change-in-production"

  # Public HTTPS ingress is required because branch gateways initiate outbound
  # discovery/heartbeat requests from networks outside Render. Every non-health
  # request is still protected by the shared bridge identity and application
  # authorization.
  - type: web
    name: sentinel-grid-control-plane
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: OMCAMERA
          property: connectionString
      - key: AUTH_MODE
        value: development
      - key: SKIP_MIGRATION_CHECKSUM_VALIDATION
        value: "true"
      - key: EDGE_BRIDGE_SHARED_KEY
        value: "dev-bridge-key-change-in-production"
      - key: MEDIA_GATEWAY_SHARED_KEY
        value: "dev-media-gateway-key-change-in-production"
      - key: ANALYTICS_ENGINE_SHARED_KEY
        value: "dev-analytics-engine-key-change-in-production"
