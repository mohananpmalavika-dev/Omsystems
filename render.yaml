services:
  # The existing production service is intentionally kept as one dashboard/BFF.
  # It connects to the current control-plane and media tunnels through env vars
  # managed by deploy/publish-render-live.ps1.
  - type: web
    name: sentinel-grid-ops
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run dashboard:build
    startCommand: npm run start --workspace @sentinel/dashboard -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DASHBOARD_DEMO_MODE
        value: "true"
